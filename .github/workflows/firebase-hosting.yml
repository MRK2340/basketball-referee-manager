name: Firebase Hosting

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  checks: write
  contents: read
  pull-requests: write

# Rapid successive merges must not deploy out of order: an older build
# finishing late would overwrite the newer live site. One in-flight run per
# ref; a newer push cancels the older run.
concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
  VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
  VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
  VITE_DEMO_MANAGER_PASSWORD: ${{ vars.VITE_DEMO_MANAGER_PASSWORD }}
  VITE_DEMO_REFEREE_PASSWORD: ${{ vars.VITE_DEMO_REFEREE_PASSWORD }}
  VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: github
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Yarn 1
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-preview:
    name: Deploy preview channel
    needs: build
    # Skip (not fail) when deploying is impossible: Dependabot-triggered
    # runs can only read Dependabot secrets (never Actions secrets), and
    # fork PRs get no secrets at all
    if: >
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      # secrets context is not allowed in job-level `if` — surface it as env
      # so steps can skip cleanly until the secret exists. Accepts either the
      # plain name or the project-suffixed one `firebase init hosting:github`
      # creates automatically; the plain name wins when both exist.
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_IWHISTLE_6F5D1 }}
    steps:
      - name: Checkout
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: actions/checkout@v4

      - name: Download build artifact
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Firebase Hosting preview channel
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          projectId: iwhistle-6f5d1
          expires: 7d

  deploy-live:
    name: Deploy to live channel
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Skip deploy steps cleanly until the service account secret exists —
      # either name works (see deploy-preview above)
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_IWHISTLE_6F5D1 }}
    steps:
      - name: Checkout
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: actions/checkout@v4

      - name: Download build artifact
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Firebase Hosting live channel
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          projectId: iwhistle-6f5d1
          channelId: live
