name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
  VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
  VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
  VITE_DEMO_MANAGER_PASSWORD: ${{ vars.VITE_DEMO_MANAGER_PASSWORD }}
  VITE_DEMO_REFEREE_PASSWORD: ${{ vars.VITE_DEMO_REFEREE_PASSWORD }}
  VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}

jobs:
  verify:
    name: Verify web app
    runs-on: ubuntu-latest
    environment: github
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Yarn 1
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

  functions:
    name: Verify Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Syntax check
        working-directory: functions
        run: node --check index.js

  backend:
    name: Verify backend dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # Full resolver dry-run — catches incompatible pins (e.g. a fastapi that
      # caps starlette below the pinned version) without installing everything
      - name: Check dependency pins resolve together
        run: |
          python -m pip install --upgrade pip
          pip install --dry-run --quiet -r backend/requirements.txt

      - name: Smoke-test the API server
        run: |
          pip install --quiet $(grep -E '^(fastapi|starlette|uvicorn|pydantic|pydantic_core)==' backend/requirements.txt) httpx
          python -m compileall -q backend
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'backend')
          import server
          from fastapi.testclient import TestClient
          resp = TestClient(server.app).get('/api/health')
          assert resp.status_code == 200, f'health returned {resp.status_code}'
          print('backend health OK:', resp.json())
          EOF

  rules:
    name: Validate Firebase rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Starting the emulators compiles firestore.rules and storage.rules —
      # a syntax error in either fails the run
      - name: Compile security rules via emulator
        run: npx --yes firebase-tools@14 emulators:exec --only firestore,storage --project demo-rules-check 'echo rules compiled OK'
